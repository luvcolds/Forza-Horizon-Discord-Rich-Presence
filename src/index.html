<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forza Horizon RP Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-root">
    <div class="panel-area">
      <header>
        <div class="logo-container">
          <img src="assets/logo.png" alt="Logo" class="logo" id="app-logo" />
          <div class="header-text">
            <h1>Forza Rich Presence</h1>
          </div>
        </div>
      </header>

      <main>
        <section class="card">
          <div class="status-header">
            <h2>Status</h2>
            <div class="status-indicator" id="status-indicator">
              <span class="pulse-dot"></span>
              <span class="status-text" id="status-text">Waiting...</span>
            </div>
          </div>
          <p class="status-detail" id="status-detail">Launch game to broadcast</p>
        </section>

        <section class="card">
          <h2>UWP Fix</h2>
          <p class="action-desc">Required for telemetry.</p>
          <button id="fix-uwp-btn" class="primary-btn">Fix Network</button>
          <p class="success-msg hidden" id="uwp-success">Fixed successfully!</p>
          <p class="error-msg hidden" id="uwp-error">Failed.</p>
        </section>

        <section class="card">
          <h2>Database</h2>
          <p class="action-desc">Update cars from GitHub.</p>
          <button id="update-db-btn" class="secondary-btn">Update Cars</button>
          <p class="success-msg hidden" id="db-success">Up to date.</p>
        </section>
      </main>

      <footer>
        <p>Running in background. You can safely close this window.</p>
      </footer>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
